// lightwalletd gRPC service definition (subset we use).
// Source: https://github.com/zcash/lightwalletd/blob/master/walletrpc/service.proto

syntax = "proto3";
package cash.z.wallet.sdk.rpc;

// ── Request / response types ─────────────────────────────────────────────────

message ChainSpec {}

message BlockID {
  uint64 height = 1;
  bytes  hash   = 2;
}

message BlockRange {
  BlockID start = 1;
  BlockID end   = 2;
}

message CompactBlock {
  uint32          protoVersion = 1;
  uint64          height       = 2;
  bytes           hash         = 3;
  bytes           prevHash     = 4;
  uint32          time         = 5;
  bytes           header       = 6;
  repeated CompactTx vtx       = 7;
  uint64          chainMetadata = 8;
}

message CompactTx {
  uint64 index    = 1;
  bytes  hash     = 2;
  uint32 fee      = 3;
  repeated CompactSaplingSpend  spends  = 4;
  repeated CompactSaplingOutput outputs = 5;
  repeated CompactOrchardAction actions = 6;
}

message CompactSaplingSpend  { bytes nf = 1; }
message CompactSaplingOutput {
  bytes cmu      = 1;
  bytes ephemeralKey = 2;
  bytes ciphertext   = 3;
}
message CompactOrchardAction {
  bytes nullifier    = 1;
  bytes cmx          = 2;
  bytes ephemeralKey = 3;
  bytes ciphertext   = 4;
}

message RawTransaction {
  bytes  data   = 1;
  uint64 height = 2;
}

message TransparentAddressBlockFilter {
  string address    = 1;
  BlockRange range  = 2;
}

message TxFilter {
  BlockID block = 1;
  uint64  index = 2;
  bytes   hash  = 3;
}

message LightdInfo {
  string version               = 1;
  string vendor                = 2;
  bool   taddrSupport          = 3;
  string chainName             = 4;
  uint64 saplingActivationHeight = 5;
  string consensusBranchId     = 6;
  uint64 blockHeight           = 7;
}

message PingResponse {
  int64 entry = 1;
  int64 exit  = 2;
}

// ── Service ───────────────────────────────────────────────────────────────────

service CompactTxStreamer {
  rpc GetLatestBlock(ChainSpec)         returns (BlockID);
  rpc GetBlock(BlockID)                 returns (CompactBlock);
  rpc GetBlockRange(BlockRange)         returns (stream CompactBlock);
  rpc GetTransaction(TxFilter)          returns (RawTransaction);
  rpc GetLightdInfo(ChainSpec)          returns (LightdInfo);
  rpc Ping(Duration)                    returns (PingResponse);
}

message Duration { int64 intervalUs = 1; }
